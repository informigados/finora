name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Validate dependency graph
        run: python -m pip check

      - name: Lint
        run: ruff check .

      - name: Security scan
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          bandit -q -r app.py config.py database models routes services extensions.py
          pip-audit -r requirements.txt

      - name: Run tests
        run: python -m pytest tests -q --cov=app --cov=config --cov=database --cov=extensions --cov=models --cov=routes --cov=services --cov-report=term-missing --cov-report=xml --cov-fail-under=90
