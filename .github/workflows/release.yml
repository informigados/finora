name: Windows Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Install Inno Setup
        run: choco install innosetup --no-progress --yes

      - name: Validate release gates
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          if ($env:GITHUB_REF_NAME -ne "v$version") {
            throw "Tag $env:GITHUB_REF_NAME does not match VERSION $version."
          }
          ruff check .
          bandit -q -r app.py desktop.py config.py database models routes services extensions.py
          pip-audit -r requirements-dev.txt
          python -m pytest tests -q --cov=app --cov=config --cov=database --cov=extensions --cov=models --cov=routes --cov=services --cov-fail-under=90

      - name: Build installer
        run: python create_installer.py

      - name: Attest installer provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: dist_setup/Finora_Setup_*.exe

      - name: Prepare release notes
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          $metadata = Get-Content dist_setup/release-metadata.json -Raw | ConvertFrom-Json
          @"
          ## Finora $version

          ### Highlights

          - Fixed the new/edit entry modal in compact desktop windows, keeping every field and action accessible through internal scrolling.
          - Preserved the modal header and footer while the form scrolls naturally with mouse, touchpad, touch, and keyboard.
          - Updated the native executable, Windows installer, update manifest, documentation, and release automation for 1.4.1.
          - Maintained official HTTPS delivery, SHA-256 checksums, pre-update backups, release metadata, and GitHub provenance attestation.

          ### Verification

          Download only from this official release and compare the installer with ``SHA256SUMS.txt``.

          Installer SHA-256: ``$($metadata.sha256)``
          "@ | Set-Content dist_setup/RELEASE_NOTES.md -Encoding utf8

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = @(
            "dist_setup/Finora_Setup_*.exe",
            "dist_setup/SHA256SUMS.txt",
            "dist_setup/release-metadata.json",
            "dist_setup/manifest.json"
          )
          gh release view $env:GITHUB_REF_NAME *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:GITHUB_REF_NAME @assets --clobber
            gh release edit $env:GITHUB_REF_NAME `
              --notes-file dist_setup/RELEASE_NOTES.md `
              --title "Finora $env:GITHUB_REF_NAME"
          } else {
            gh release create $env:GITHUB_REF_NAME @assets `
              --verify-tag `
              --notes-file dist_setup/RELEASE_NOTES.md `
              --title "Finora $env:GITHUB_REF_NAME"
          }
