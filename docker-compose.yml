version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./database:/app/database
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=change_this_secret_key_in_production
      - DATABASE_URL=sqlite:////app/database/finora.db
    restart: unless-stopped
