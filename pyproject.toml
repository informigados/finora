[tool.ruff]
line-length = 110
target-version = "py312"
exclude = [
  ".git",
  ".pytest_cache",
  ".venv",
  "build",
  "dist",
  "dist_setup",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "B"]

[tool.ruff.lint.per-file-ignores]
"tests/*.py" = ["B011"]

[tool.pytest.ini_options]
filterwarnings = [
  "ignore:datetime.datetime.utcnow\\(\\) is deprecated.*:DeprecationWarning:flask_login.login_manager",
]
