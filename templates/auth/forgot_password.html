{% extends "base.html" %}

{% block styles %}
<style>
    .login-container { min-height: calc(100vh - 260px); }
</style>
{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center login-container">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">{{ _('Recuperar Senha') }}</h3>
                <form action="{{ url_for('auth.forgot_password') }}" method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label for="identifier" class="form-label">{{ _('Usuário ou e-mail') }}</label>
                        <div class="input-group">
                            <span class="input-group-text"><i data-lucide="user" class="icon-sm"></i></span>
                            <input type="text" class="form-control" id="identifier" name="identifier" required>
                        </div>
                        <div class="form-text">{{ _('Digite seu nome de usuário ou email para encontrar sua conta.') }}</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">{{ _('Método de Recuperação') }}</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="method" id="methodEmail" value="email" checked>
                            <label class="form-check-label" for="methodEmail">
                                {{ _('Enviar link por e-mail') }}
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="method" id="methodOffline" value="offline">
                            <label class="form-check-label" for="methodOffline">
                                {{ _('Usar Chave de Recuperação (Offline)') }}
                            </label>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">{{ _('Continuar') }}</button>
                        <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary">{{ _('Cancelar') }}</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
