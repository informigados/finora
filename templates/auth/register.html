{% extends "base.html" %}

{% block title %}{{ _('Criar Conta') }} | Finora{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center auth-shell">
    <div class="col-md-6 col-lg-5">
        <div class="card card-premium auth-card-premium border-0">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">{{ _('Criar Conta') }}</h3>
                <form action="{{ url_for('auth.register') }}" method="POST" id="registerForm" class="auth-form-clean-validation" data-loading-text="{{ _('Cadastrando...') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label for="name" class="form-label">{{ _('Nome Completo') }}</label>
                        <div class="input-group">
                            <span class="input-group-text"><i data-lucide="contact" class="icon-sm"></i></span>
                            <input type="text" class="form-control" id="name" name="name" required autocomplete="name">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="username" class="form-label">{{ _('Nome de Usuário') }}</label>
                        <div class="input-group">
                            <span class="input-group-text"><i data-lucide="user" class="icon-sm"></i></span>
                            <input type="text" class="form-control" id="username" name="username" required autocomplete="username">
                            <span class="input-group-text auth-status-icon" id="username-status"></span>
                        </div>
                        <div class="form-text" id="username-help"></div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">{{ _('E-mail') }}</label>
                        <div class="input-group">
                            <span class="input-group-text"><i data-lucide="mail" class="icon-sm"></i></span>
                            <input type="email" class="form-control" id="email" name="email" required autocomplete="email">
                            <span class="input-group-text auth-status-icon" id="email-status"></span>
                        </div>
                        <div class="form-text" id="email-help"></div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">{{ _('Senha') }}</label>
                        <div class="input-group">
                            <span class="input-group-text"><i data-lucide="lock" class="icon-sm"></i></span>
                            <input type="password" class="form-control" id="password" name="password" required autocomplete="new-password">
                        </div>
                        <div class="progress mt-2 auth-progress-wrapper">
                            <div class="progress-bar auth-progress-bar-initial" role="progressbar" id="password-strength-bar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="{{ _('Força da senha') }}" title="{{ _('Força da senha') }}"></div>
                        </div>
                        <div class="form-text" id="password-strength-text">{{ _('Recomendamos uma senha forte.') }}</div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">{{ _('Cadastrar') }}</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <p class="mb-0">{{ _('Já tem uma conta?') }} <a href="{{ url_for('auth.login') }}" class="text-decoration-none">{{ _('Entrar') }}</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script nonce="{{ csp_nonce }}">
document.addEventListener('DOMContentLoaded', function() {
    const usernameInput = document.getElementById('username');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const usernameStatusIcon = document.getElementById('username-status');
    const emailStatusIcon = document.getElementById('email-status');
    const usernameHelp = document.getElementById('username-help');
    const emailHelp = document.getElementById('email-help');

    function refreshLucideIcons() {
        if (window.lucide && typeof window.lucide.createIcons === 'function') {
            window.lucide.createIcons();
        }
    }

    function setFieldState(input, iconEl, helpEl, availableText, unavailableText, isAvailable, neutralText = '') {
        iconEl.style.display = 'block';
        if (neutralText) {
            iconEl.innerHTML = '<i data-lucide="info" class="text-muted icon-sm"></i>';
            helpEl.textContent = neutralText;
            helpEl.className = 'form-text text-muted';
        } else {
            iconEl.innerHTML = isAvailable
                ? '<i data-lucide="check" class="text-success icon-sm"></i>'
                : '<i data-lucide="x" class="text-danger icon-sm"></i>';
            helpEl.textContent = isAvailable ? availableText : unavailableText;
            helpEl.className = isAvailable ? 'form-text text-success' : 'form-text text-danger';
        }

        // Keep native field border feedback, but avoid duplicated bootstrap validation icon.
        input.classList.toggle('is-valid', isAvailable && !neutralText);
        input.classList.toggle('is-invalid', !isAvailable && !neutralText);
        refreshLucideIcons();
    }
    
    // Check Username Availability
    usernameInput.addEventListener('blur', function() {
        const username = this.value;
        if(username.length > 0) {
            fetch('{{ url_for("auth.check_username") }}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').getAttribute('content')
                },
                body: JSON.stringify({username: username})
            })
            .then(response => response.json())
            .then(data => {
                setFieldState(
                    usernameInput,
                    usernameStatusIcon,
                    usernameHelp,
                    "{{ _('Nome de usuário disponível') }}",
                    "{{ _('Nome de usuário já está em uso') }}",
                    Boolean(data.available),
                    data.verified === false ? data.message || '' : ''
                );
            });
        }
    });
    
    // Check Email Availability
    emailInput.addEventListener('blur', function() {
        const email = this.value;

        // Regex para validação de formato
        const emailRegex = /^[\w\.-]+@[\w\.-]+\.\w+$/;

        if(email.length > 0) {
            if (!emailRegex.test(email)) {
                setFieldState(
                    emailInput,
                    emailStatusIcon,
                    emailHelp,
                    "{{ _('E-mail disponível') }}",
                    "{{ _('Formato de email inválido') }}",
                    false
                );
                return;
            }

            fetch('{{ url_for("auth.check_email") }}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').getAttribute('content')
                },
                body: JSON.stringify({email: email})
            })
            .then(response => response.json())
            .then(data => {
                setFieldState(
                    emailInput,
                    emailStatusIcon,
                    emailHelp,
                    "{{ _('E-mail disponível') }}",
                    "{{ _('E-mail já está em uso') }}",
                    Boolean(data.available),
                    data.verified === false ? data.message || '' : ''
                );
            });
        }
    });

    usernameInput.addEventListener('input', function() {
        usernameStatusIcon.style.display = 'none';
        usernameStatusIcon.innerHTML = '';
        usernameHelp.textContent = '';
        this.classList.remove('is-valid', 'is-invalid');
    });

    emailInput.addEventListener('input', function() {
        emailStatusIcon.style.display = 'none';
        emailStatusIcon.innerHTML = '';
        emailHelp.textContent = '';
        this.classList.remove('is-valid', 'is-invalid');
    });
    
    // Password Strength Meter
    passwordInput.addEventListener('input', function() {
        const password = this.value;
        const bar = document.getElementById('password-strength-bar');
        const text = document.getElementById('password-strength-text');
        
        let strength = 0;
        if (password.length >= 8) strength += 20;
        if (password.match(/[a-z]+/)) strength += 20;
        if (password.match(/[A-Z]+/)) strength += 20;
        if (password.match(/[0-9]+/)) strength += 20;
        if (password.match(/[$@#&!]+/)) strength += 20;
        
        bar.style.width = strength + '%';
        
        if (strength < 40) {
            bar.className = 'progress-bar bg-danger';
            text.textContent = "{{ _('Fraca') }}";
        } else if (strength < 80) {
            bar.className = 'progress-bar bg-warning';
            text.textContent = "{{ _('Média') }}";
        } else {
            bar.className = 'progress-bar bg-success';
            text.textContent = "{{ _('Forte') }}";
        }
    });
});
</script>
{% endblock %}
