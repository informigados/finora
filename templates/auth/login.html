{% extends "base.html" %}

{% block title %}{{ _('Entrar') }} | Finora{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center auth-shell">
    <div class="col-md-6 col-lg-4">
        <div class="card card-premium auth-card-premium border-0">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">{{ _('Entrar') }}</h3>
                <form action="{{ url_for('auth.login') }}" method="POST" data-loading-text="{{ _('Entrando...') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label for="identifier" class="form-label">{{ _('Usuário ou e-mail') }}</label>
                        <div class="input-group">
                            <span class="input-group-text"><i data-lucide="user" class="icon-sm"></i></span>
                            <input type="text" class="form-control" id="identifier" name="identifier" required autocomplete="username">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">{{ _('Senha') }}</label>
                        <div class="input-group">
                            <span class="input-group-text"><i data-lucide="lock" class="icon-sm"></i></span>
                            <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password">
                        </div>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label" for="remember">{{ _('Lembrar-me') }}</label>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg d-inline-flex align-items-center justify-content-center gap-2"><i data-lucide="log-in" class="icon-sm"></i><span>{{ _('Entrar') }}</span></button>
                    </div>
                    <div class="text-center mt-3">
                        <a href="{{ url_for('auth.forgot_password') }}" class="text-decoration-none d-inline-flex align-items-center gap-1"><i data-lucide="key-round" class="icon-xs"></i><span>{{ _('Esqueceu sua senha?') }}</span></a>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <p class="mb-0">{{ _('Não tem uma conta?') }} <a href="{{ url_for('auth.register') }}" class="text-decoration-none d-inline-flex align-items-center gap-1"><i data-lucide="user-plus" class="icon-xs"></i><span>{{ _('Cadastre-se') }}</span></a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
