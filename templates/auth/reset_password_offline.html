{% extends "base.html" %}

{% block title %}{{ _('Redefinir Senha Offline') }} | Finora{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center auth-shell">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">{{ _('Redefinir Senha') }}</h3>
                <p class="text-muted text-center">{{ _('Use seu identificador e a chave de recuperação para redefinir a senha com segurança.') }}</p>

                <form action="{{ url_for('auth.reset_password_offline') }}" method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label for="identifier" class="form-label">{{ _('Usuário ou e-mail') }}</label>
                        <div class="input-group">
                            <span class="input-group-text"><i data-lucide="user" class="icon-sm"></i></span>
                            <input type="text" class="form-control" id="identifier" name="identifier" required value="{{ identifier or '' }}" autocomplete="username">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="recovery_key" class="form-label">{{ _('Chave de Recuperação') }}</label>
                        <div class="input-group">
                            <span class="input-group-text"><i data-lucide="key" class="icon-sm"></i></span>
                            <input type="text" class="form-control text-uppercase" id="recovery_key" name="recovery_key" required placeholder="ABCD1234EFGH5678" autocomplete="one-time-code">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="new_password" class="form-label">{{ _('Nova Senha') }}</label>
                        <div class="input-group">
                            <span class="input-group-text"><i data-lucide="lock" class="icon-sm"></i></span>
                            <input type="password" class="form-control" id="new_password" name="new_password" required autocomplete="new-password">
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">{{ _('Redefinir Senha') }}</button>
                        <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary">{{ _('Cancelar') }}</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
