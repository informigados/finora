{% extends "base.html" %}

{% block styles %}
<style>
    .login-container { min-height: calc(100vh - 260px); }
</style>
{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center login-container">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">{{ _('Redefinir Senha') }}</h3>
                <p class="text-muted text-center">{{ _('Usuário: ') }} <strong>{{ user.username }}</strong></p>

                <form action="{{ url_for('auth.reset_password_offline', user_id=user.id) }}" method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label for="recovery_key" class="form-label">{{ _('Chave de Recuperação') }}</label>
                        <div class="input-group">
                            <span class="input-group-text"><i data-lucide="key" class="icon-sm"></i></span>
                            <input type="text" class="form-control" id="recovery_key" name="recovery_key" required placeholder="ABCD1234EFGH5678">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="new_password" class="form-label">{{ _('Nova Senha') }}</label>
                        <div class="input-group">
                            <span class="input-group-text"><i data-lucide="lock" class="icon-sm"></i></span>
                            <input type="password" class="form-control" id="new_password" name="new_password" required>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">{{ _('Redefinir Senha') }}</button>
                        <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary">{{ _('Cancelar') }}</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
